name: O LIFE Supreme — Full Auto Deploy

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: echo "✅ GitHub Pages live → ${{ steps.deploy.outputs.page_url }}"

  deploy-worker:
    name: Deploy → Cloudflare Worker
    runs-on: ubuntu-latest
    needs: deploy-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker to Cloudflare
        run: |
          ACCOUNT_ID="${{ secrets.CF_ACCOUNT_ID }}"
          API_TOKEN="${{ secrets.CF_API_TOKEN }}"
          PAGES_URL="${{ needs.deploy-pages.outputs.page_url }}"
          PAGES_URL="${PAGES_URL%/}"
          WORKER_NAME="olife-supreme"

          cat > worker.js << 'WORKER'
          const ORIGIN = "PAGES_URL_PLACEHOLDER";
          export default {
            async fetch(request, env, ctx) {
              const url = new URL(request.url);
              if (request.method === "OPTIONS") {
                return new Response(null, {
                  headers: {
                    "Access-Control-Allow-Origin": "*",
                    "Access-Control-Allow-Methods": "GET, POST, OPTIONS",
                    "Access-Control-Allow-Headers": "*",
                  },
                });
              }
              const originPath = (url.pathname === "/" || url.pathname === "") ? "/index.html" : url.pathname;
              const originURL = ORIGIN + originPath;
              const cache = caches.default;
              const cacheKey = new Request(originURL, { method: "GET" });
              let response = await cache.match(cacheKey);
              if (!response) {
                response = await fetch(originURL, {
                  headers: { "Accept-Encoding": "br, gzip" },
                });
                const headers = new Headers(response.headers);
                headers.set("Access-Control-Allow-Origin", "*");
                headers.set("Cache-Control", "public, max-age=60, stale-while-revalidate=3600");
                const toCache = new Response(response.body, { status: response.status, headers });
                ctx.waitUntil(cache.put(cacheKey, toCache.clone()));
                return toCache;
              }
              return response;
            },
          };
          WORKER

          sed -i "s|PAGES_URL_PLACEHOLDER|${PAGES_URL}|g" worker.js

          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Content-Type: application/javascript+module" \
            --data-binary @worker.js

          echo "✅ Done — GitHub Pages: ${PAGES_URL}"
